name: Sync File Updates with Upstream

on:
  schedule:
    # 매일 자정(KST 기준 오전 9시)에 동기화 실행
    - cron: '0 0 * * *'
  workflow_dispatch: # 수동으로 동기화를 트리거할 수 있는 버튼 추가

jobs:
  sync_latest_from_upstream:
    runs-on: ubuntu-latest
    name: Sync latest commits from upstream repo

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v3
        with:
          ref: main

      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.1
        with:
          upstream_sync_repo: SeoNaRu/lexguard-mcp
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }} # (GitHub에서 자동 제공)
          test_mode: false

      - name: Sync check
        if: failure()
        run: |
          echo "동기화 실패. 수동 확인이 필요할 수 있습니다."
          exit 1
